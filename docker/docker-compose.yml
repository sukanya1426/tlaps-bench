version: "3.8"

services:
  bench:
    image: tlaps-bench
    build:
      context: .
      dockerfile: Dockerfile
    # NET_ADMIN for iptables firewall, LINUX_IMMUTABLE for chattr +i on tlapm
    cap_add:
      - NET_ADMIN
      - LINUX_IMMUTABLE
    environment:
      # Pass API keys at runtime (never baked into image)
      # For OpenAI: set OPENAI_API_KEY in host env or .env file
      # For Azure: set AZURE_OPENAI_API_KEY and AZURE_OPENAI_HOST
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_HOST=${AZURE_OPENAI_HOST:-}
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    volumes:
      # Benchmark files (read-only)
      - ../benchmark:/benchmark:ro
      # Scripts — checker as binary (not readable source), runner as source
      - ../check_proof_bin:/scripts/check_proof_bin:ro
      - ../run_codex_benchmark.py:/scripts/run_codex_benchmark.py:ro
      # Optional: custom codex config (for Azure users etc.)
      - ./codex-config.toml:/mnt/codex-config.toml:ro
      # Results output
      - ../results:/result
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Entrypoint sets up iptables whitelist (only OpenAI/Azure API allowed)
    # then drops to unprivileged 'bench' user via gosu
