version: "3.8"

services:
  bench:
    image: tlaps-bench
    build:
      context: .
      dockerfile: Dockerfile
    # NET_ADMIN for iptables firewall, LINUX_IMMUTABLE for chattr +i on tlapm
    cap_add:
      - NET_ADMIN
      - LINUX_IMMUTABLE
    environment:
      # Pass API keys at runtime (never baked into image)
      # For OpenAI (codex backend):     set OPENAI_API_KEY
      # For Azure (codex backend):      set AZURE_OPENAI_API_KEY + AZURE_OPENAI_HOST
      # For Anthropic (claude_code):    set ANTHROPIC_API_KEY
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_HOST=${AZURE_OPENAI_HOST:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    volumes:
      # Benchmark files (read-only) — mount level1 specifically for L1 runs
      - ../benchmark/level1:/benchmark:ro
      # Scripts — checker as binary (not readable source), runner as source.
      # Bind-mount the prompts dir too so prompt edits don't require a rebuild.
      - ../check_proof_bin:/scripts/check_proof_bin:ro
      - ../src/evaluator/runner.py:/scripts/runner.py:ro
      - ../src/evaluator/prompts:/scripts/prompts:ro
      # Optional: custom codex config (for Azure users etc.)
      - ./codex-config.toml:/mnt/codex-config.toml:ro
      # Results output
      - ../results:/result
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Entrypoint sets up iptables whitelist (only OpenAI/Azure API allowed)
    # then drops to unprivileged 'bench' user via gosu
